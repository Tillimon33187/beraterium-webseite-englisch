approach: "As a marketing and PR expert with over seven years of experience in team coaching, brand development and internal corporate communication, I combine scientific methods for analysing relationships with their practical application in everyday business."
goal: "I support companies in strengthening their teams, recognising potential and convincing both in the market and internally through smart communication and targeted employer branding."
extended:
  - text: "Marketing is not just about visibility — it is also about building important connections."
  - text: "As a marketing and PR expert with over seven years of experience in team coaching, brand development and internal corporate communication, I have gained unique insights into team and organisational dynamics. My career took me from the tourism sector through the creative department of a major bakery manufacturer and the role of marketing director at AIESEC to teaching at one of Russia's leading universities."
  - text: "I hold a master's degree in social analysis and have worked intensively on employment relationships, particularly in connection with crises such as the coronavirus pandemic. I learned how important it is to consider leadership, team dynamics and individual potential holistically. My approach combines scientific methods for analysing relationships with their practical application in everyday business."
  - label: "What drives me"
    text: "I am convinced that sustainable business success happens where strong leadership meets a genuine understanding of people. This requires clear communication, targeted employee retention measures and a feel for the opportunities within every team — especially in difficult times."
  - text: "Understanding and nurturing the dynamics within your own team forms the basis for sustainable growth, innovation and a strong market position."
teaser_bio: "Marketing and PR expert — strengthens teams through communication and employer branding."
