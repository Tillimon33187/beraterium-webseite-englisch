approach: "I combine sound expertise in business, human resources and risk management with practical experience from my own start-ups and consulting projects. My approach brings leaders and employees together to find solutions that genuinely work: individual, practical and easy to understand. The result is structures that enable growth, share responsibility and make everyday working life less stressful."
goal: "I support SMEs and growing companies with HR and risk management solutions that are usually available only to large organisations — clear, affordable and immediately actionable. This helps companies become places where people enjoy working, take responsibility and grow together."
extended:
  - text: "As soon as a team understands how important its contribution is to the bigger picture, it moves from going through the motions to genuine engagement. I see my role as bringing everyone to the table."
  - text: "As an economist, founder and consultant, I have learned that business success happens where people share responsibility, structures are clear and everyone can fulfil their potential. My path has taken me through various industries — from event management and fashion to advising start-ups and SMEs. Time and again, I have seen how important it is not only to identify risks but also to develop sustainable solutions for growth and a strong company culture together."
  - text: "I recognised early on that traditional, hierarchical leadership rarely leads to peak performance. What is really needed is clarity, trust and honest dialogue on equal terms. In my academic work and research on MaxDiff analysis, I developed methods that make teams' needs visible and enable real change."
teaser_bio: "Combines business, human resources and risk management with experience from his own start-ups."
