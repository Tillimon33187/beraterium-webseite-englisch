extended:
  - text: "Stagnation means falling behind — I show you where your opportunities for optimisation lie and how to use them."
  - text: "With over 20 years in the textile sector, I have learned that business success happens where people truly collaborate, problems are addressed openly and everyone can contribute their experience. My path took me from key account manager for major clients such as C&A and Karstadt to developing innovative IT solutions in companies. Time and again, I saw how important it is not only to identify surface-level problems but also to develop sustainable solutions for growth and genuine improvement together."
  - text: "I recognised early on that optimisation is not a one-off process — it requires continuous change and the willingness to question the familiar. What is really needed is clarity about the true challenges, trust between those involved and honest, open communication. With my practical experience in the fashion industry and my know-how in IT modernisation, I developed methods that reveal the real needs of teams and companies and enable genuine, lasting change."
  - label: "My approach"
    text: "I combine sound knowledge from over 20 years in the textile industry with practical expertise in IT solution development and business optimisation. My approach brings management and employees together to find solutions that genuinely work — individual, practical and actionable in everyday working life. The result is structures that enable growth, share responsibility and embed optimisation processes sustainably in company culture."
  - label: "My goal"
    text: "I support textile companies and manufacturing businesses in seeing stagnation not as rest but as a barrier to growth. With my experience and eye for hidden opportunities, I help you optimise your processes, mobilise your teams and make your company fit for the future. My aim is for optimisation and change to be perceived not as a burden but as an opportunity for genuine improvement and shared success — for greater clarity, confidence and real collaboration within your company."
teaser_bio: "Textile expert with over 20 years of industry experience — mobilises teams for genuine optimisation."
